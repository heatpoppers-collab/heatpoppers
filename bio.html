<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heat Poppers</title>
<link rel="icon" href="https://i.imgur.com/FnhVKFL.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:'Outfit',sans-serif;
  background:#050508;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:2.5rem 1.5rem;
  overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 500px 350px at 50% 25%,rgba(110,30,0,0.35) 0%,transparent 65%),
    radial-gradient(ellipse 400px 500px at 50% 85%,rgba(10,10,110,0.4) 0%,transparent 60%);
}
.scanlines{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(59,130,246,0.012) 2px,rgba(59,130,246,0.012) 4px)}
.particles{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.particle{position:absolute;border-radius:50%;opacity:0;animation:floatUp linear infinite}
@keyframes floatUp{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:0.5}90%{opacity:0.5}100%{transform:translateY(-10vh) scale(1);opacity:0}}

.wrap{
  position:relative;z-index:1;
  width:100%;max-width:400px;
  display:flex;flex-direction:column;align-items:center;
  gap:1.25rem;
}

.badge{
  display:inline-flex;align-items:center;gap:0.4rem;
  padding:0.35rem 0.9rem;border-radius:20px;
  border:1px solid rgba(239,68,68,0.3);background:rgba(239,68,68,0.1);
  color:#ef4444;font-size:0.68rem;font-weight:600;
  letter-spacing:2px;text-transform:uppercase;
  animation:pulse 2s ease-in-out infinite;
}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;background:#ef4444;box-shadow:0 0 6px #ef4444}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}

.logo{width:min(260px,75vw);display:block}

.tagline{font-size:0.7rem;letter-spacing:5px;text-transform:uppercase;color:rgba(255,255,255,0.25);text-align:center}

.desc{text-align:center;font-size:0.9rem;color:rgba(255,255,255,0.45);line-height:1.65;max-width:300px}

.links{display:flex;flex-direction:column;gap:0.7rem;width:100%}

.btn{
  display:flex;align-items:center;justify-content:center;gap:0.7rem;
  padding:0.95rem 1.5rem;border-radius:12px;
  font-family:'Outfit',sans-serif;font-size:0.9rem;font-weight:600;
  text-decoration:none;transition:all 0.25s;border:none;cursor:pointer;
  letter-spacing:0.3px;
}
.btn-catalog{background:linear-gradient(135deg,#FF8C00,#FF5500,#FF2200);color:#fff;box-shadow:0 0 28px rgba(255,100,0,0.22)}
.btn-catalog:hover{transform:translateY(-2px);box-shadow:0 4px 28px rgba(255,100,0,0.42)}
.btn-wa{background:linear-gradient(135deg,#FF2200,#DD0033,#BB0055);color:#fff;box-shadow:0 0 22px rgba(200,0,60,0.2)}
.btn-wa:hover{transform:translateY(-2px);box-shadow:0 4px 22px rgba(200,0,60,0.4)}
.btn-ig{background:linear-gradient(135deg,#BB0055,#881188,#6622CC);color:#fff;box-shadow:0 0 22px rgba(120,40,180,0.2)}
.btn-ig:hover{transform:translateY(-2px);box-shadow:0 4px 22px rgba(120,40,180,0.4)}

.divider{width:100%;display:flex;align-items:center;gap:0.6rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.07)}
.divider span{font-size:0.65rem;color:rgba(255,255,255,0.18);letter-spacing:2px;text-transform:uppercase}

.foot{font-size:0.68rem;color:rgba(255,255,255,0.18);letter-spacing:0.5px;text-align:center;line-height:1.9}
</style>
</head>
<body>
<div class="scanlines"></div>
<div class="particles" id="particles"></div>

<div class="wrap" id="wrap">

  <div class="badge">Precio de Lanzamiento</div>

  <div class="tagline">Hot · Bold · Alive</div>

  <div class="desc">Los poppers más potentes del mercado.<br>Entrega discreta en Bogotá y todo el país.</div>

  <div class="links">

      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Ver catálogo completo

      <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Pedir por WhatsApp
    </a>

    <a href="https://www.instagram.com/heatpoppers_/" class="btn btn-ig" target="_blank" rel="noopener">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
      @heatpoppers_
    </a>

  </div>

  <div class="divider"><span>Info</span></div>

  <div class="foot">
    Envío discreto · Bogotá y todo Colombia<br>
    Uso exclusivo para adultos mayores de 18 años
  </div>

</div>

<script>
(function(){
  var c=document.getElementById('particles');
  var colors=['#f97316','#ef4444','#3b82f6','#06b6d4'];
  for(var i=0;i<22;i++){
    var p=document.createElement('div');p.className='particle';
    p.style.left=Math.random()*100+'%';
    p.style.animationDuration=(Math.random()*12+10)+'s';
    p.style.animationDelay=(Math.random()*10)+'s';
    var s=Math.random()*2+1;p.style.width=s+'px';p.style.height=s+'px';
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.appendChild(p);
  }
  var els=Array.from(document.querySelectorAll('#wrap > *'));
  els.forEach(function(el){el.style.opacity='0';});
  els.forEach(function(el,i){
    setTimeout(function(){
      el.style.transition='opacity 0.7s ease';
      el.style.opacity='1';
    },150+i*180);
  });
})();
</script>
</body>
</html>
